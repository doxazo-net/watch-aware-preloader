name: Fuzz

# Weekly scheduled fuzzing plus on-demand runs. Native Go fuzz targets double as
# seed-corpus regression tests under `go test` (that runs in ci.yml); this
# workflow does the mutating exploration that is too slow for every push.
#
# Discovery is a static matrix: every target is listed explicitly so adding one
# is an intentional, reviewable one-line change. The drift-check job fails if the
# number of `func Fuzz*` definitions under internal/ stops matching the matrix,
# so a new target cannot be silently left unfuzzed.

on:
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Fuzz matrix drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Matrix entry count matches live Fuzz functions
        run: |
          live=$(grep -RhoE --include='*.go' '^func Fuzz[A-Za-z0-9_]+' internal/ | sort -u | wc -l | tr -d ' ')
          entries=$(grep -cE '^[[:space:]]*fuzz:[[:space:]]*"?Fuzz' .github/workflows/fuzz.yml | tr -d ' ')
          echo "live Fuzz functions: $live"
          echo "matrix entries:      $entries"
          if [ "$live" != "$entries" ]; then
            echo "FAIL: fuzz matrix ($entries) is out of sync with internal/ Fuzz* functions ($live)."
            echo "Update the matrix in .github/workflows/fuzz.yml to match."
            exit 1
          fi
          echo "OK: matrix is current."

  fuzz:
    name: Fuzz ${{ matrix.fuzz }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: ./internal/pathmap
            fuzz: FuzzToHost
          - pkg: ./internal/config
            fuzz: FuzzConfigLoad
          - pkg: ./internal/mediaserver/emby
            fuzz: FuzzValidateBaseURL
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Restore corpus cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          # Accumulated interesting inputs live in <pkg>/testdata/fuzz/<Fuzz>;
          # key on go.sum so a dependency bump starts a fresh corpus rather than
          # replaying inputs against changed code.
          path: |
            ~/.cache/go-build
            ${{ matrix.pkg }}/testdata/fuzz/${{ matrix.fuzz }}
          key: fuzz-corpus-${{ matrix.fuzz }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            fuzz-corpus-${{ matrix.fuzz }}-
      - name: Fuzz
        run: go test -run='^$' -fuzz='^${{ matrix.fuzz }}$' -fuzztime=10m ${{ matrix.pkg }}
      - name: Upload crash corpus
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-${{ matrix.fuzz }}
          path: ${{ matrix.pkg }}/testdata/fuzz/${{ matrix.fuzz }}
          if-no-files-found: ignore
