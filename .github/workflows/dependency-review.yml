# Review dependency changes on pull requests for known vulnerabilities.
# Fails on high or critical severity advisories in new dependencies.

name: Dependency Review

on:
  # All PRs (incl. stacked PRs targeting a feature branch), not just base=main.
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
