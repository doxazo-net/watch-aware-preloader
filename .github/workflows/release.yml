name: Release Unraid Plugin

# Cut a release by pushing a letter-free version tag (Slackware requires no
# letters in the version):
#   YYYY.MM.DD     -> release
#   YYYY.MM.DD.N   -> test/iteration build (for install-testing)
#
# Every tag now publishes as a full GitHub "latest" release (none is marked
# prerelease). GitHub excludes prereleases from releases/latest, so the Unraid
# update check that fetches releases/latest/download/watch-aware-preloader.plg
# only resolves when the newest release is a full/latest release.
#
# The job builds the noarch .txz, renders the .plg from plugin/plugin.j2, and
# publishes them as release assets. It creates the release as a DRAFT, uploads
# the assets, then publishes - the only asset-upload order compatible with this
# repo's immutable releases (a published release is frozen and rejects late
# uploads). Nothing is committed to main: the install URL is the stable
# releases/latest/download/watch-aware-preloader.plg asset, so no protected-
# branch push is needed.

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # tag message + git describe for the changelog/version

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build the preloadd binary into the plugin tree
        env:
          PLUGIN_VERSION: ${{ github.ref_name }}
        run: ./plugin/build.sh

      - name: Package the noarch .txz and checksum
        id: pkg
        env:
          PLUGIN_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release
          txz="watch-aware-preloader-${PLUGIN_VERSION}-noarch-1.txz"
          ( cd src && tar --owner=0 --group=0 -cJf "${GITHUB_WORKSPACE}/release/${txz}" ./* )
          checksum="$(cd release && sha256sum "${txz}" | awk '{print $1}')"
          printf '%s' "${checksum}" > "release/${txz}.sha256"
          {
            echo "txz=${txz}"
            echo "checksum=${checksum}"
          } >> "$GITHUB_OUTPUT"

      - name: Render the .plg from the template
        env:
          PLUGIN_VERSION: ${{ github.ref_name }}
          PLUGIN_CHECKSUM: ${{ steps.pkg.outputs.checksum }}
        run: |
          set -euo pipefail
          changelog="$(git tag -l --format='%(contents)' "${PLUGIN_VERSION}")"
          if [ -z "${changelog}" ]; then
            changelog="Release ${PLUGIN_VERSION}"
          fi
          # The changelog is injected into a <![CDATA[ ... ]]> block. A literal
          # "]]>" in the tag message would terminate the CDATA early and yield a
          # malformed .plg, so split it the canonical way ("]]>" -> "]]]]><![CDATA[>":
          # close CDATA after "]]", emit "]]>", reopen CDATA, then ">").
          changelog="${changelog//]]>/]]]]><![CDATA[>}"
          export PLUGIN_CHANGELOG="${changelog}"
          # Render with the stdlib only - no pip/venv/network. plugin.j2 uses just
          # {{ env['VAR'] }} substitution, so a tiny regex renderer covers it and
          # keeps CI free of any unpinned runtime dependency. The guard below fails
          # loudly if the template ever grows a feature beyond simple substitution.
          python3 - <<'PY'
          import os
          import re
          import sys

          token = re.compile(r"\{\{\s*env\[['\"]([^'\"]+)['\"]\]\s*\}\}")

          def replace(match):
              key = match.group(1)
              value = os.environ.get(key)
              if value is None:
                  sys.exit(f"render: missing environment variable {key}")
              return value

          with open('plugin/plugin.j2', encoding='utf-8') as fh:
              template = fh.read()
          # Detect unsupported template features on the TEMPLATE itself (before value
          # injection), so an env VALUE that legitimately contains "{{" or "{%" (e.g. a
          # changelog line) cannot false-trip this guard.
          leftover = token.sub('', template)
          if '{{' in leftover or '{%' in leftover:
              sys.exit("render: plugin.j2 uses template features beyond "
                       "{{ env['VAR'] }} substitution")
          rendered = token.sub(replace, template)
          with open('release/watch-aware-preloader.plg', 'w', encoding='utf-8') as fh:
              fh.write(rendered)
          PY
          echo "Rendered .plg:"
          sed -n '1,20p' release/watch-aware-preloader.plg
          # Fail loudly if the render dropped the version or checksum, rather
          # than publishing a .plg that points at the wrong (or no) package.
          grep -qF "${PLUGIN_VERSION}" release/watch-aware-preloader.plg \
            || { echo "render check failed: version missing from .plg" >&2; exit 1; }
          grep -qF "${PLUGIN_CHECKSUM}" release/watch-aware-preloader.plg \
            || { echo "render check failed: checksum missing from .plg" >&2; exit 1; }
          # Fail loudly if the rendered .plg is not well-formed XML - e.g. a CDATA
          # break, or any future template/render drift - rather than publishing a
          # .plg the Unraid plugin manager rejects only at user install time.
          # Stdlib xml.etree (expat) only; the .plg is <!DOCTYPE PLUGIN> with no
          # custom entities, so a plain parse validates well-formedness.
          python3 -c 'import xml.etree.ElementTree as ET; ET.parse("release/watch-aware-preloader.plg")' \
            || { echo "render check failed: rendered .plg is not well-formed XML" >&2; exit 1; }

      - name: Create draft release, upload assets, then publish (immutable-safe)
        env:
          GH_TOKEN: ${{ github.token }}
          PLUGIN_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Enforce a strictly numeric dotted version (3 or 4 segments) so a
          # non-numeric tag (e.g. 2024.07.01-rc1) can never be misclassified as
          # a stable release by the segment count below. Slackware also forbids
          # letters in the version.
          if ! printf '%s' "${PLUGIN_VERSION}" | grep -Eq '^[0-9]+(\.[0-9]+){2,3}$'; then
            echo "Refusing: tag '${PLUGIN_VERSION}' is not a numeric dotted version (YYYY.MM.DD or YYYY.MM.DD.N)." >&2
            exit 1
          fi
          # Draft first so the assets attach while the release is still mutable;
          # publishing the draft then freezes it with the assets in place.
          gh release create "${PLUGIN_VERSION}" \
            --draft \
            --title "${PLUGIN_VERSION}" \
            --notes "Automated release ${PLUGIN_VERSION}. Install or update from the latest-release URL: https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/watch-aware-preloader.plg" \
            "release/${{ steps.pkg.outputs.txz }}" \
            "release/${{ steps.pkg.outputs.txz }}.sha256" \
            "release/watch-aware-preloader.plg"
          gh release edit "${PLUGIN_VERSION}" --draft=false
