name: CodeQL

on:
  push:
    branches: [main]
  # All PRs (incl. stacked PRs targeting a feature branch), not just base=main.
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: go

      - name: Build
        run: |
          CGO_ENABLED=0 go build -o /dev/null ./cmd/preloadd

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:go

  # The workflows are code too, and they are the highest-privilege code here:
  # they hold the GITHUB_TOKEN. The `actions` language analyzes them for the
  # issues Go analysis cannot see (untrusted checkout of a PR head, script
  # injection via ${{ }} interpolation of attacker-controlled fields, an
  # over-scoped token). build-mode: none because there is nothing to compile.
  analyze-actions:
    name: Analyze Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:actions
