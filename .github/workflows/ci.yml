name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch, so stacked PRs (targeting a
  # feature branch, not main) still get full CI. A base-restricted filter here
  # silently skipped CI on stacked PRs.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: CGO_ENABLED=1 go test -race -count=1 ./...

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: latest

  go-build:
    name: Go Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/preloadd

  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.3"
          tools: composer
          coverage: none
      - run: composer install --no-interaction --no-progress
      - name: PHPStan + PHP-CS-Fixer (skips cleanly until plugin/ or src/ has PHP)
        run: |
          if find plugin src -type f \( -name '*.php' -o -name '*.page' \) | grep -q .; then
            vendor/bin/phpstan analyse --no-progress
            vendor/bin/php-cs-fixer fix --dry-run --diff
          else
            echo "no PHP files under plugin/ or src/ yet - skipping PHP lint"
          fi
      - name: PHP unit tests (test/*_test.php)
        run: |
          shopt -s nullglob
          found=0
          for t in test/*_test.php; do
            found=1
            echo "== $t =="
            php "$t"
          done
          [ "$found" -eq 1 ] || echo "no PHP test scripts yet - skipping"
      - name: rc.preloadd render test (PHP -> bash .cfg contract)
        run: bash test/rc_preloadd_render_test.sh
      - name: .plg render CDATA safety test (#23)
        run: bash test/plg_render_test.sh

  shell-smoke:
    name: Install-by-URL Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: make smoke-test

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run shellcheck on shipped bash
        run: |
          files=$(find src -type f -name 'rc.*' 2>/dev/null; find test -type f -name '*.sh' 2>/dev/null; find scripts -type f -name '*.sh' 2>/dev/null)
          # shellcheck disable=SC2086  # $files is a space-separated path list; word-splitting is intended.
          if [ -n "$files" ]; then shellcheck $files; else echo "no shell scripts"; fi
